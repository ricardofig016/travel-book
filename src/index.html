<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Travel Book</title>
    <base href="/" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="icon" type="image/x-icon" href="favicon.ico" />
    <script>
      // Restore path encoded by 404.html (SPA GitHub Pages redirect fix).
      (function (l) {
        if (l.search[1] === "/") {
          var decoded = l.search
            .slice(1)
            .split("&")
            .map(function (s) {
              return s.replace(/~and~/g, "&");
            });
          window.history.replaceState(
            null,
            null,
            l.pathname.slice(0, -1) +
              decoded[0] +
              (decoded[1] ? "?" + decoded[1] : "") +
              l.hash,
          );
        }
      })(window.location);
    </script>
  </head>
  <body>
    <app-root></app-root>
  </body>
</html>
