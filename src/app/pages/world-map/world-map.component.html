<section class="map-page">
  <h1>Map Preview</h1>

  <div class="map-controls">
    <button type="button" (click)="zoomOut()">-</button>
    <button type="button" (click)="resetZoom()">Reset</button>
    <button type="button" (click)="resetView()">Reset View</button>
    <button type="button" (click)="zoomIn()">+</button>
    <span>Zoom: {{ zoom() }}x</span>
  </div>

  <div class="hover-metadata">
    <strong>Hovered Country:</strong>
    @if (hoveredCountry(); as country) {
      <span>{{ country.name }}</span>
      <span>ISO2: {{ country.iso2 }}</span>
      <span>ISO3: {{ country.iso3 }}</span>
      <span>Parts: {{ country.parts }}</span>
    } @else {
      <span>None</span>
    }
  </div>

  <div
    #mapCanvas
    class="map-canvas"
    [class.is-dragging]="isDragging()"
    (pointerdown)="onPointerDown($event)"
    (pointermove)="onPointerMove($event)"
    (pointerup)="onPointerUp($event)"
    (pointercancel)="onPointerUp($event)"
    (pointerleave)="onPointerUp($event)"
  >
    <svg
      class="country-map"
      [attr.viewBox]="viewBox()"
      [style.transform]="mapTransform()"
      (pointermove)="onSvgPointerMove($event)"
      (pointerleave)="onSvgPointerLeave()"
    >
      <!-- Grid: Meridians -->
      @for (path of gridPaths().meridians; track $index) {
        <path
          [attr.d]="path"
          fill="none"
          stroke="#ddd"
          stroke-width="0.4"
          pointer-events="none"
          vector-effect="non-scaling-stroke"
        ></path>
      }
      <!-- Grid: Parallels -->
      @for (path of gridPaths().parallels; track $index) {
        <path
          [attr.d]="path"
          fill="none"
          stroke="#ddd"
          stroke-width="0.4"
          pointer-events="none"
          vector-effect="non-scaling-stroke"
        ></path>
      }
      <!-- Country boundaries and hover fill -->
      @for (country of countries(); track country.id) {
        <g
          class="country-shape"
          [attr.data-country-id]="country.id"
          [attr.aria-label]="country.name"
        >
          @for (path of country.paths; track $index) {
            <path
              class="country-path"
              [attr.d]="path"
              [attr.fill]="
                hoveredCountryId() === country.id ? '#f2df95' : 'transparent'
              "
              stroke="#000"
              stroke-width="0.65"
              vector-effect="non-scaling-stroke"
            ></path>
          }
        </g>
      }
    </svg>
  </div>

  <div class="nav-controls">
    <button type="button" (click)="navigatePrev()">&lt;</button>
    <button type="button" (click)="navigateNext()">&gt;</button>
  </div>
</section>
