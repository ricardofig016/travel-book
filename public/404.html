<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Travel Book</title>
    <script>
      // SPA redirect for GitHub Pages.
      // Encodes the requested path into a query parameter so that index.html
      // can restore it with history.replaceState before Angular boots.
      // See: https://github.com/rafgraph/spa-github-pages
      var segmentsToKeep = 1; // number of path segments in the repo base href (/travel-book)
      var l = window.location;
      l.replace(
        l.protocol +
          "//" +
          l.hostname +
          (l.port ? ":" + l.port : "") +
          l.pathname
            .split("/")
            .slice(0, 1 + segmentsToKeep)
            .join("/") +
          "/?/" +
          l.pathname
            .slice(1)
            .split("/")
            .slice(segmentsToKeep)
            .join("/")
            .replace(/&/g, "~and~") +
          (l.search ? "&" + l.search.slice(1).replace(/&/g, "~and~") : "") +
          l.hash,
      );
    </script>
  </head>
  <body></body>
</html>
